<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Queue — C Backend</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="noise"></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-mark">Q</div>
      <div>
        <h1>TaskQueue</h1>
        <span class="subtitle">C-Powered Backend</span>
      </div>
    </div>
    <div class="server-status">
      <span class="dot" id="statusDot"></span>
      <span id="serverStatus">Connecting...</span>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="statSize">0</span>
      <span class="stat-label">In Queue</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="statProcessed">0</span>
      <span class="stat-label">Processed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Total Added</span>
    </div>
  </div>

  <!-- INPUT SECTION -->
  <div class="input-card">
    <div class="input-row">
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="text" id="taskInput" placeholder="Enter task name..." autocomplete="off" />
      </div>

      <div class="priority-wrap">
        <label>Priority</label>
        <div class="priority-btns">
          <button class="prio-btn" data-p="1" title="Low">1</button>
          <button class="prio-btn" data-p="2" title="Medium-Low">2</button>
          <button class="prio-btn active" data-p="3" title="Medium">3</button>
          <button class="prio-btn" data-p="4" title="High">4</button>
          <button class="prio-btn" data-p="5" title="Critical">5</button>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-add" onclick="addTask()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Enqueue Task
      </button>
      <button class="btn-process" onclick="processTask()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Process Next
      </button>
      <button class="btn-clear" onclick="clearQueue()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear All
      </button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- QUEUE LIST -->
  <div class="queue-section">
    <div class="queue-header">
      <span>Queue</span>
      <span class="queue-order-label">↑ Highest Priority First</span>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">∅</div>
      <p>Queue is empty</p>
      <small>Add tasks above to get started</small>
    </div>

    <ul id="taskList"></ul>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
